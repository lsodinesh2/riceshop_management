<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customers</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white p-4 md:p-8 min-h-screen">

<div class="flex justify-between items-center mb-6">

    <h1 class="text-2xl md:text-3xl font-bold flex items-center gap-2">
        <span>🧑</span> Customers
    </h1>

    <a href="/dashboard"
       class="bg-slate-800 hover:bg-slate-700 transition px-4 py-2 rounded-xl text-sm font-medium">
        ⬅ Back
    </a>

</div>

<form action="/add-customer" method="POST"
      class="bg-slate-900 p-5 md:p-6 rounded-xl mb-8">

    <h2 class="text-lg md:text-xl font-semibold mb-4 flex items-center gap-2">
        <span>➕</span> Add Customer
    </h2>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">

        <div class="flex flex-col">
            <label class="text-slate-400 text-xs font-medium mb-1 md:hidden">Customer Name</label>
            <input name="name"
                   placeholder="Customer Name"
                   required
                   class="p-3.5 md:p-3 bg-slate-800 rounded text-base w-full focus:outline-none focus:ring-2 focus:ring-pink-500/50">
        </div>

        <div class="flex flex-col">
            <label class="text-slate-400 text-xs font-medium mb-1 md:hidden">Phone</label>
            <input name="phone"
                   placeholder="Phone"
                   required
                   class="p-3.5 md:p-3 bg-slate-800 rounded text-base w-full focus:outline-none focus:ring-2 focus:ring-pink-500/50">
        </div>

        <div class="flex flex-col">
            <label class="text-slate-400 text-xs font-medium mb-1 md:hidden">Address</label>
            <input name="address"
                   placeholder="Address"
                   class="p-3.5 md:p-3 bg-slate-800 rounded text-base w-full focus:outline-none focus:ring-2 focus:ring-pink-500/50">
        </div>

        <div class="flex flex-col">
            <label class="text-slate-400 text-xs font-medium mb-1 md:hidden">Due Amount</label>
            <input name="due_amount"
                   type="number"
                   step="0.01"
                   placeholder="Due Amount"
                   class="p-3.5 md:p-3 bg-slate-800 rounded text-base w-full focus:outline-none focus:ring-2 focus:ring-pink-500/50">
        </div>

    </div>

    <button type="submit" class="mt-5 w-full md:w-auto bg-pink-600 hover:bg-pink-700 active:scale-[0.99] transition font-semibold px-6 py-3.5 md:py-3 rounded-xl shadow-lg shadow-pink-600/10">
        Add Customer
    </button>

</form>

<div class="bg-slate-900 rounded-xl overflow-hidden">

    <div class="overflow-x-auto">

        <table class="w-full min-w-[600px] text-sm md:text-base">

            <thead class="bg-slate-800 text-slate-300">
                <tr>
                    <th class="p-4 text-left font-semibold">Name</th>
                    <th class="p-4 text-left font-semibold">Phone</th>
                    <th class="p-4 text-left font-semibold">Address</th>
                    <th class="p-4 text-left font-semibold">Due</th>
                    <th class="p-4 text-left font-semibold">Actions</th>
                </tr>
            </thead>

            <tbody>

                {% for c in customers %}

                <tr class="border-t border-slate-800/60 hover:bg-slate-800/30 transition-colors">

                    <td class="p-4 font-medium">{{ c.name }}</td>
                    <td class="p-4 text-slate-400">{{ c.phone }}</td>
                    <td class="p-4 text-slate-300">{{ c.address }}</td>
                    <td class="p-4 text-red-400 font-semibold">₹{{ c.due_amount }}</td>

                    <td class="p-4">
                        <a href="/delete-customer/{{ c.id }}"
                           class="text-red-500 hover:text-red-400 font-semibold inline-block py-1 px-2 -ml-2 rounded active:bg-red-500/10"
                           onclick="return confirm('Delete this customer?')">
                            Delete
                        </a>
                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
