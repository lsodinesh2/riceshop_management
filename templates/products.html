<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white p-4 md:p-8 min-h-screen">

<div class="flex justify-between items-center mb-6">

    <h1 class="text-2xl md:text-3xl font-bold flex items-center gap-2">
        <span>📦</span> Products
    </h1>

    <a href="/dashboard"
       class="bg-slate-800 hover:bg-slate-700 transition px-4 py-2 rounded-xl text-sm font-medium">
        ⬅ Back
    </a>

</div>

<form action="/add-product" method="POST"
      class="bg-slate-900 p-5 md:p-6 rounded-xl mb-8">

    <h2 class="text-lg md:text-xl font-semibold mb-4 flex items-center gap-2">
        <span>➕</span> Add Product
    </h2>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

        <div class="flex flex-col">
            <label class="text-slate-400 text-xs font-medium mb-1 md:hidden">Rice Name</label>
            <input name="rice_name"
                   placeholder="Rice Name"
                   required
                   class="p-3.5 md:p-3 rounded-xl bg-slate-800 text-white text-base w-full focus:outline-none focus:ring-2 focus:ring-pink-500/50">
        </div>

        <div class="flex flex-col">
            <label class="text-slate-400 text-xs font-medium mb-1 md:hidden">Category</label>
            <input name="category"
                   placeholder="Category"
                   required
                   class="p-3.5 md:p-3 rounded-xl bg-slate-800 text-white text-base w-full focus:outline-none focus:ring-2 focus:ring-pink-500/50">
        </div>

        <div class="flex flex-col">
            <label class="text-slate-400 text-xs font-medium mb-1 md:hidden">Purchase Price (₹)</label>
            <input name="purchase_price"
                   type="number"
                   step="0.01"
                   placeholder="Purchase Price"
                   required
                   class="p-3.5 md:p-3 rounded-xl bg-slate-800 text-white text-base w-full focus:outline-none focus:ring-2 focus:ring-pink-500/50">
        </div>

        <div class="flex flex-col">
            <label class="text-slate-400 text-xs font-medium mb-1 md:hidden">Selling Price (₹)</label>
            <input name="selling_price"
                   type="number"
                   step="0.01"
                   placeholder="Selling Price"
                   required
                   class="p-3.5 md:p-3 rounded-xl bg-slate-800 text-white text-base w-full focus:outline-none focus:ring-2 focus:ring-pink-500/50">
        </div>

        <div class="flex flex-col">
            <label class="text-slate-400 text-xs font-medium mb-1 md:hidden">Stock KG</label>
            <input name="stock_kg"
                   type="number"
                   step="0.01"
                   placeholder="Stock KG"
                   required
                   class="p-3.5 md:p-3 rounded-xl bg-slate-800 text-white text-base w-full focus:outline-none focus:ring-2 focus:ring-pink-500/50">
        </div>

        <div class="flex flex-col">
            <label class="text-slate-400 text-xs font-medium mb-1 md:hidden">Stock Bags</label>
            <input name="stock_bags"
                   type="number"
                   placeholder="Stock Bags"
                   required
                   class="p-3.5 md:p-3 rounded-xl bg-slate-800 text-white text-base w-full focus:outline-none focus:ring-2 focus:ring-pink-500/50">
        </div>

    </div>

    <button type="submit" class="mt-5 w-full md:w-auto bg-pink-600 hover:bg-pink-700 active:scale-[0.99] transition font-semibold px-6 py-3.5 md:py-3 rounded-xl shadow-lg shadow-pink-600/10">
        Add Product
    </button>

</form>

<div class="bg-slate-900 rounded-xl overflow-hidden">

    <div class="overflow-x-auto">

        <table class="w-full min-w-[700px] text-sm md:text-base">

            <thead class="bg-slate-800 text-slate-300">
                <tr>
                    <th class="p-4 text-left font-semibold">Rice</th>
                    <th class="p-4 text-left font-semibold">Category</th>
                    <th class="p-4 text-left font-semibold">Buy</th>
                    <th class="p-4 text-left font-semibold">Sell</th>
                    <th class="p-4 text-left font-semibold">Stock KG</th>
                    <th class="p-4 text-left font-semibold">Bags</th>
                    <th class="p-4 text-left font-semibold">Actions</th>
                </tr>
            </thead>

            <tbody>

            {% for product in products %}

                <tr class="border-t border-slate-800/60 hover:bg-slate-800/30 transition-colors">

                    <td class="p-4 font-medium text-white">{{ product.rice_name }}</td>

                    <td class="p-4 text-slate-400">{{ product.category }}</td>

                    <td class="p-4 font-mono">₹{{ product.purchase_price }}</td>

                    <td class="p-4 font-mono text-emerald-400 font-medium">₹{{ product.selling_price }}</td>

                    <td class="p-4 text-slate-300">{{ product.stock_kg }}</td>

                    <td class="p-4 text-slate-300">{{ product.stock_bags }}</td>

                    <td class="p-4">
                        <div class="flex items-center gap-3">
                            <a href="/edit-product/{{ product.id }}"
                               class="text-yellow-400 hover:text-yellow-300 font-semibold transition active:scale-95">
                                Edit
                            </a>

                            <span class="text-slate-700">|</span>

                            <a href="/delete-product/{{ product.id }}"
                               class="text-red-500 hover:text-red-400 font-semibold transition active:scale-95"
                               onclick="return confirm('Are you sure?')">
                                Delete
                            </a>
                        </div>
                    </td>

                </tr>

            {% endfor %}

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
