<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rice Shop Management</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body{
    background:
    linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
    url('https://images.unsplash.com/photo-1586201375761-83865001e31c');
    background-size:cover;
    background-position:center;
}

.glass{
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px); /* Safari support */
    background: rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
}

.input-box{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.1);
}

.input-box:focus{
    outline:none;
    border-color:#22c55e;
    box-shadow: 0 0 10px rgba(34, 197, 94, 0.2);
}
</style>

</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-6">

<div class="glass w-full max-w-md rounded-3xl p-6 sm:p-8 shadow-2xl transition-all duration-300">

    <div class="text-center mb-6 sm:mb-8">

        <div class="w-16 h-16 sm:w-20 sm:h-20 mx-auto rounded-full bg-green-500 flex items-center justify-center text-2xl sm:text-3xl text-white mb-4 shadow-lg shadow-green-500/30">
            <i class="fa-solid fa-wheat-awn"></i>
        </div>

        <h1 class="text-2xl sm:text-3xl font-bold text-white tracking-wide">
            Rice Shop ERP
        </h1>

        <p class="text-gray-300 text-sm sm:text-base mt-1.5">
            Sign in to continue
        </p>

    </div>

    <form method="POST" class="space-y-4">

        <div>
            <label class="text-gray-200 text-sm block mb-1.5 font-medium pl-1">
                Username
            </label>

            <input
                type="text"
                name="username"
                required
                class="input-box w-full p-3.5 rounded-xl text-white text-base transition-all duration-200"
                placeholder="Enter username">
        </div>

        <div>

            <label class="text-gray-200 text-sm block mb-1.5 font-medium pl-1">
                Password
            </label>

            <div class="relative">

                <input
                    type="password"
                    id="password"
                    name="password"
                    required
                    class="input-box w-full p-3.5 pr-12 rounded-xl text-white text-base transition-all duration-200"
                    placeholder="Enter password">

                <button
                    type="button"
                    onclick="togglePassword()"
                    class="absolute right-0 top-0 h-full w-12 flex items-center justify-center text-gray-400 hover:text-gray-200 active:scale-95 transition-transform"
                    aria-label="Toggle password visibility">

                    <i id="eyeIcon" class="fa-solid fa-eye text-lg"></i>

                </button>

            </div>

        </div>

        <div class="flex flex-row justify-between items-center py-1 gap-2">

            <label class="text-gray-300 text-sm flex items-center gap-2 select-none cursor-pointer">
                <input type="checkbox" class="w-4 h-4 rounded accent-green-600 cursor-pointer">
                Remember Me
            </label>

            <a href="#"
               class="text-green-400 text-sm hover:text-green-300 transition-colors font-medium">
                Forgot Password?
            </a>

        </div>

        <div class="pt-2">
            <button
                type="submit"
                class="w-full bg-green-600 hover:bg-green-700 active:bg-green-800 active:scale-[0.99] transition-all p-3.5 rounded-xl text-white font-semibold text-base shadow-lg shadow-green-600/20">
                Login
            </button>
        </div>

    </form>

</div>

<script>

function togglePassword(){

    const password = document.getElementById("password");
    const icon = document.getElementById("eyeIcon");

    if(password.type === "password"){
        password.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        password.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }

}

</script>

</body>
</html>
