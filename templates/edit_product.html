<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Product</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white flex items-center justify-center min-h-screen p-4">

<div class="bg-slate-900 p-5 md:p-8 rounded-2xl w-full max-w-2xl shadow-2xl">

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-xl md:text-2xl font-bold flex items-center gap-2">
            <span>✏️</span> Edit Rice Product
        </h1>
        <a href="/products" class="text-xs md:text-sm bg-slate-800 hover:bg-slate-700 transition px-3 py-1.5 rounded-lg text-slate-300">
            Cancel
        </a>
    </div>

    <form method="POST">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

            <div class="flex flex-col">
                <label class="text-slate-400 text-xs font-medium mb-1.5 pl-1">Rice Variety / Name</label>
                <input name="rice_name"
                       value="{{ product.rice_name }}"
                       required
                       class="p-3.5 md:p-3 bg-slate-800 rounded-xl text-base w-full focus:outline-none focus:ring-2 focus:ring-pink-500/50">
            </div>

            <div class="flex flex-col">
                <label class="text-slate-400 text-xs font-medium mb-1.5 pl-1">Category</label>
                <input name="category"
                       value="{{ product.category }}"
                       class="p-3.5 md:p-3 bg-slate-800 rounded-xl text-base w-full focus:outline-none focus:ring-2 focus:ring-pink-500/50">
            </div>

            <div class="flex flex-col">
                <label class="text-slate-400 text-xs font-medium mb-1.5 pl-1">Purchase Price (₹)</label>
                <input name="purchase_price"
                       type="number"
                       step="0.01"
                       value="{{ product.purchase_price }}"
                       class="p-3.5 md:p-3 bg-slate-800 rounded-xl text-base w-full focus:outline-none focus:ring-2 focus:ring-pink-500/50">
            </div>

            <div class="flex flex-col">
                <label class="text-slate-400 text-xs font-medium mb-1.5 pl-1">Selling Price (₹)</label>
                <input name="selling_price"
                       type="number"
                       step="0.01"
                       value="{{ product.selling_price }}"
                       class="p-3.5 md:p-3 bg-slate-800 rounded-xl text-base w-full focus:outline-none focus:ring-2 focus:ring-pink-500/50">
            </div>

            <div class="flex flex-col">
                <label class="text-slate-400 text-xs font-medium mb-1.5 pl-1">Stock Level (KG)</label>
                <input name="stock_kg"
                       type="number"
                       step="0.01"
                       value="{{ product.stock_kg }}"
                       class="p-3.5 md:p-3 bg-slate-800 rounded-xl text-base w-full focus:outline-none focus:ring-2 focus:ring-pink-500/50">
            </div>

            <div class="flex flex-col">
                <label class="text-slate-400 text-xs font-medium mb-1.5 pl-1">Stock Level (Bags)</label>
                <input name="stock_bags"
                       type="number"
                       value="{{ product.stock_bags }}"
                       class="p-3.5 md:p-3 bg-slate-800 rounded-xl text-base w-full focus:outline-none focus:ring-2 focus:ring-pink-500/50">
            </div>

        </div>

        <button type="submit" class="mt-6 bg-pink-600 hover:bg-pink-700 active:bg-pink-800 active:scale-[0.99] transition-all py-3.5 rounded-xl w-full font-semibold text-base shadow-lg shadow-pink-600/10">
            Update Product
        </button>

    </form>

</div>

</body>
</html>
